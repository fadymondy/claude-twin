appId: com.fadymondy.claude-twin
productName: claude-twin
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - shim/**/*
  - resources/**/*
  - package.json
  - '!**/*.{md,test.ts,spec.ts}'
asar: true
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  # Until MAC_CSC_LINK + APPLE_ID secrets are configured, builds are
  # ad-hoc signed only. hardenedRuntime requires real signing for the
  # app to launch. Override per-build via `--config.mac.hardenedRuntime=true
  # --config.mac.identity=auto` once Developer ID is set.
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
win:
  target:
    - target: nsis
      arch:
        - x64
linux:
  target:
    - AppImage
  category: Development
publish:
  provider: github
  owner: fadymondy
  repo: claude-twin
