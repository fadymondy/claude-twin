name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: ${{ matrix.os }} build + sign
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          # Intentionally NOT caching npm: setup-node's cache key isn't
          # platform-aware enough for binary deps like app-builder-bin
          # (whose per-OS executables would get clobbered across mac/win/
          # linux runners, manifesting as "spawn .../app-builder ENOENT"
          # during electron-builder's package step).

      - name: Install dependencies
        run: npm ci

      - name: Diagnose app-builder-bin
        shell: bash
        run: |
          echo '== root node_modules/app-builder-bin =='
          ls -la node_modules/app-builder-bin/ || true
          echo '== mac =='
          ls -la node_modules/app-builder-bin/mac/ 2>&1 || true
          echo '== linux/x64 =='
          ls -la node_modules/app-builder-bin/linux/x64/ 2>&1 || true
          echo '== win/x64 =='
          ls -la node_modules/app-builder-bin/win/x64/ 2>&1 || true
          echo '== desktop/node_modules/electron-builder =='
          ls -la desktop/node_modules/electron-builder 2>&1 | head -3 || true
          ls -la desktop/node_modules/.bin/ 2>&1 | head -10 || true
          echo '== which electron-builder =='
          (cd desktop && node -e 'console.log(require.resolve("app-builder-bin/index.js"))') || true
          echo '== file size of expected binary =='
          if [ "${{ runner.os }}" = "macOS" ]; then
            ls -la node_modules/app-builder-bin/mac/app-builder_arm64 2>&1 || true
          elif [ "${{ runner.os }}" = "Windows" ]; then
            ls -la node_modules/app-builder-bin/win/x64/app-builder.exe 2>&1 || true
          else
            ls -la node_modules/app-builder-bin/linux/x64/app-builder 2>&1 || true
          fi

      # If the binary really is missing, reinstall just app-builder-bin
      # locally into desktop/node_modules to bypass any workspace hoist issue.
      - name: Recover app-builder-bin if missing
        shell: bash
        run: |
          MISSING=0
          if [ "${{ runner.os }}" = "macOS" ]; then
            [ ! -f node_modules/app-builder-bin/mac/app-builder_arm64 ] && MISSING=1
          elif [ "${{ runner.os }}" = "Windows" ]; then
            [ ! -f node_modules/app-builder-bin/win/x64/app-builder.exe ] && MISSING=1
          else
            [ ! -f node_modules/app-builder-bin/linux/x64/app-builder ] && MISSING=1
          fi
          if [ "$MISSING" = "1" ]; then
            echo 'app-builder-bin binary missing — reinstalling fresh'
            rm -rf node_modules/app-builder-bin
            npm install app-builder-bin --no-save --workspace-root --no-fund --no-audit
          else
            echo 'app-builder-bin binary present'
          fi

      - name: Build mcp-server
        run: npm -w @claude-twin/mcp-server run build

      - name: Build + package desktop
        env:
          # macOS notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # macOS code signing
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # Windows code signing
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm -w @claude-twin/desktop run package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claude-twin-${{ matrix.os }}
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.exe
            desktop/dist/*.AppImage
            desktop/dist/*.zip
            desktop/dist/latest*.yml
          retention-days: 30

  publish-extension:
    name: package extension zip
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - name: Zip extension
        run: |
          cd extension
          REF="${GITHUB_REF##*/}"
          zip -r "../claude-twin-extension-${REF}.zip" . -x "node_modules/*" "dist/*" "*.test.js"
      - uses: softprops/action-gh-release@v2
        with:
          files: claude-twin-extension-*.zip

  publish-mcp-shim-npm:
    name: publish mcp-server shim to npm
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
      - name: Install + build
        run: |
          npm ci
          npm rebuild app-builder-bin || true
          npm -w @claude-twin/mcp-server run build
      - name: Publish to npm (skip if NODE_AUTH_TOKEN missing)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret is not set; skipping publish."
            exit 0
          fi
          npm publish -w @claude-twin/mcp-server --provenance --access public

  release-notes:
    name: GitHub Release notes
    runs-on: ubuntu-latest
    needs: [release, publish-extension]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract changelog section
        id: changelog
        run: |
          REF="${GITHUB_REF##*/}"
          VERSION="${REF#v}"
          NOTES=$(awk -v ver="## [$VERSION]" '
            $0 == ver { found=1; next }
            found && /^## / { exit }
            found
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          {
            echo 'notes<<EOF'
            echo "$NOTES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: true
