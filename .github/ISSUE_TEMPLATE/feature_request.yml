name: Feature Request
description: Suggest a new feature or improvement for claude-twin
labels: ["type:feature", "status:todo"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting a feature. Please describe what you'd like.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Include the workflow you're stuck on.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your ideal solution.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of claude-twin would change?
      multiple: true
      options:
        - Chrome extension (manifest, service worker, offscreen)
        - Content script — new platform
        - Content script — existing platform
        - MCP server — tool surface
        - MCP server — WebSocket bridge
        - MCP server — auth / config
        - Claude Code plugin (slash commands, skills, agents)
        - Documentation / README
        - CI / tooling
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform (if applicable)
      description: Which platform integration does this touch?
      multiple: true
      options:
        - gmail
        - slack
        - whatsapp
        - discord
        - telegram
        - twitter / x
        - github
        - linear
        - jira
        - gcal
        - calcom
        - gmeet
        - zoom
        - gcp-billing
        - claude-usage
        - openai-usage
        - perplexity-usage
        - not platform-specific

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've considered.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, sample command outputs, screenshots, or anything else.
